<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 1420" font-family="system-ui, -apple-system, sans-serif">
  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="#6366f1"/>
    </marker>
    <marker id="arrow-gray" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="#94a3b8"/>
    </marker>
    <marker id="arrow-amber" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="#f59e0b"/>
    </marker>
    <linearGradient id="bg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e1b4b"/>
    </linearGradient>
  </defs>

  <rect width="900" height="1420" rx="16" fill="url(#bg)"/>

  <!-- Title -->
  <text x="450" y="48" text-anchor="middle" fill="#e2e8f0" font-size="24" font-weight="700">llmfood</text>
  <text x="450" y="72" text-anchor="middle" fill="#94a3b8" font-size="13">Docusaurus HTML → LLM-friendly Markdown</text>

  <!-- Step 1: Entry Point -->
  <rect x="250" y="100" width="400" height="56" rx="10" fill="#312e81" stroke="#6366f1" stroke-width="1.5"/>
  <text x="450" y="124" text-anchor="middle" fill="#c7d2fe" font-size="13" font-weight="600">Entry Point</text>
  <text x="450" y="142" text-anchor="middle" fill="#a5b4fc" font-size="12" font-family="monospace">generateLlmsMarkdown(config)</text>

  <!-- Arrow 1→2 -->
  <line x1="450" y1="156" x2="450" y2="186" stroke="#6366f1" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Step 2: Discover -->
  <rect x="250" y="190" width="400" height="70" rx="10" fill="#1e293b" stroke="#334155" stroke-width="1"/>
  <text x="270" y="213" fill="#e2e8f0" font-size="13" font-weight="600">1. Discover Pages</text>
  <text x="270" y="232" fill="#94a3b8" font-size="11" font-family="monospace">discoverPages(buildDir)</text>
  <text x="270" y="250" fill="#64748b" font-size="11">Recursively find all index.html, filter by ignorePatterns</text>

  <!-- Arrow 2→3 -->
  <line x1="450" y1="260" x2="450" y2="290" stroke="#6366f1" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Step 3: Resolve External Content -->
  <rect x="100" y="294" width="700" height="130" rx="10" fill="#1a2332" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="120" y="318" fill="#fcd34d" font-size="13" font-weight="700">2. Resolve External Content</text>

  <!-- Source scanning -->
  <rect x="120" y="332" width="660" height="76" rx="8" fill="#1e293b" stroke="#334155" stroke-width="1"/>
  <text x="135" y="352" fill="#e2e8f0" font-size="11" font-weight="600">Source-based scanning (requires docsDir)</text>
  <text x="135" y="370" fill="#94a3b8" font-size="10">Extract GitHub CodeBlock refs → fetch from raw.githubusercontent.com → resolves "loading..." blocks</text>
  <text x="135" y="386" fill="#94a3b8" font-size="10">Extract mermaid blocks from .md/.mdx → inject into HTML (client-side renders leave no trace)</text>
  <text x="135" y="402" fill="#64748b" font-size="10">Extract remote URLs → fetch content → resolves "Loading content..." · Inlines imported MDX snippets</text>

  <!-- Arrow 3→4 -->
  <line x1="450" y1="424" x2="450" y2="454" stroke="#6366f1" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Step 4: Process (loop) -->
  <rect x="170" y="458" width="560" height="54" rx="10" fill="#312e81" stroke="#6366f1" stroke-width="1.5" stroke-dasharray="6 3"/>
  <text x="450" y="482" text-anchor="middle" fill="#c7d2fe" font-size="13" font-weight="600">3. Process Each Page</text>
  <text x="450" y="500" text-anchor="middle" fill="#a5b4fc" font-size="11" font-family="monospace">for each urlPath → processPage(config, urlPath)</text>

  <!-- Arrow 4→sub-steps -->
  <line x1="450" y1="512" x2="450" y2="542" stroke="#6366f1" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Sub-step: Read HTML -->
  <rect x="100" y="546" width="700" height="56" rx="8" fill="#1e293b" stroke="#334155" stroke-width="1"/>
  <text x="120" y="569" fill="#e2e8f0" font-size="12" font-weight="600">3a. Read HTML + Detect Redirects</text>
  <text x="120" y="588" fill="#64748b" font-size="10">Read index.html → check for meta-refresh redirect → skip if redirect</text>

  <!-- Arrow -->
  <line x1="450" y1="602" x2="450" y2="628" stroke="#6366f1" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Sub-step: Apply Resolvers -->
  <rect x="100" y="632" width="700" height="56" rx="8" fill="#1e293b" stroke="#f59e0b" stroke-width="1"/>
  <text x="120" y="655" fill="#fcd34d" font-size="12" font-weight="600">3b. Apply Content Resolvers</text>
  <text x="120" y="674" fill="#64748b" font-size="10">Replace GitHub code placeholders → Inject mermaid blocks → Replace "Loading content..."</text>

  <!-- Arrow -->
  <line x1="450" y1="688" x2="450" y2="714" stroke="#6366f1" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Sub-step: Hooks -->
  <rect x="100" y="718" width="700" height="56" rx="8" fill="#1e293b" stroke="#7c3aed" stroke-width="1"/>
  <text x="120" y="741" fill="#c4b5fd" font-size="12" font-weight="600">3c. Post-Processing Hooks</text>
  <text x="120" y="760" fill="#64748b" font-size="10">postProcessHtml(html, context) → htmlToMarkdown() → postProcessMarkdown(md, context)</text>

  <!-- Arrow -->
  <line x1="450" y1="774" x2="450" y2="800" stroke="#6366f1" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Convert detail box -->
  <rect x="100" y="804" width="700" height="150" rx="10" fill="#1a1333" stroke="#7c3aed" stroke-width="1.5"/>
  <text x="120" y="828" fill="#c4b5fd" font-size="13" font-weight="700">convert.ts — htmlToMarkdown()</text>

  <text x="120" y="850" fill="#94a3b8" font-size="11">1. Extract &lt;article&gt; content</text>
  <text x="120" y="868" fill="#94a3b8" font-size="11">2. Strip Docusaurus chrome (nav, footer, TOC, styles, SVGs)</text>
  <text x="120" y="886" fill="#94a3b8" font-size="11">3. Turndown with 11 custom rules:</text>
  <text x="140" y="904" fill="#7c3aed" font-size="10" font-family="monospace">codeBlock · admonition · tabs · details · table · strikethrough</text>
  <text x="140" y="920" fill="#7c3aed" font-size="10" font-family="monospace">mathBlock · mathInline · images · youtubeIframe · mermaidCodeBlock</text>
  <text x="120" y="940" fill="#94a3b8" font-size="11">4. Clean up heading anchors + collapse newlines</text>

  <!-- Arrow to write -->
  <line x1="450" y1="954" x2="450" y2="980" stroke="#6366f1" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Write .md file -->
  <rect x="250" y="984" width="400" height="44" rx="8" fill="#1e293b" stroke="#334155" stroke-width="1"/>
  <text x="450" y="1011" text-anchor="middle" fill="#e2e8f0" font-size="12" font-weight="600">3d. Write Individual .md File</text>

  <!-- Arrow to collect -->
  <line x1="450" y1="1028" x2="450" y2="1058" stroke="#6366f1" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Collect + Skip reporting -->
  <rect x="150" y="1062" width="600" height="60" rx="8" fill="#312e81" stroke="#6366f1" stroke-width="1"/>
  <text x="450" y="1085" text-anchor="middle" fill="#c7d2fe" font-size="12" font-weight="600">Collect PageEntry[] + Track Skipped Pages</text>
  <text x="450" y="1105" text-anchor="middle" fill="#94a3b8" font-size="10" font-family="monospace">logSkipSummary() — redirect | empty | no-file | error</text>

  <!-- Arrow -->
  <line x1="450" y1="1122" x2="450" y2="1152" stroke="#6366f1" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Output section -->
  <rect x="100" y="1156" width="700" height="160" rx="12" fill="#0f2a1e" stroke="#22c55e" stroke-width="1.5"/>
  <text x="450" y="1184" text-anchor="middle" fill="#86efac" font-size="14" font-weight="700">4. Generate Output Files</text>

  <!-- llms.txt -->
  <rect x="130" y="1201" width="300" height="96" rx="8" fill="#1e293b" stroke="#334155" stroke-width="1"/>
  <text x="280" y="1224" text-anchor="middle" fill="#e2e8f0" font-size="12" font-weight="600">generateLlmsTxt()</text>
  <text x="280" y="1244" text-anchor="middle" fill="#64748b" font-size="10">Group pages by URL section</text>
  <text x="280" y="1260" text-anchor="middle" fill="#64748b" font-size="10">Apply sectionOrder + sectionLabels</text>
  <text x="280" y="1278" text-anchor="middle" fill="#22c55e" font-size="11" font-weight="600" font-family="monospace">→ build/llms.txt</text>

  <!-- Custom files -->
  <rect x="470" y="1201" width="300" height="96" rx="8" fill="#1e293b" stroke="#334155" stroke-width="1"/>
  <text x="620" y="1224" text-anchor="middle" fill="#e2e8f0" font-size="12" font-weight="600">generateCustomLlmsFiles()</text>
  <text x="620" y="1244" text-anchor="middle" fill="#64748b" font-size="10">Filter pages by includePatterns</text>
  <text x="620" y="1260" text-anchor="middle" fill="#64748b" font-size="10">Inline full markdown content</text>
  <text x="620" y="1278" text-anchor="middle" fill="#22c55e" font-size="11" font-weight="600" font-family="monospace">→ build/llms-full.txt etc.</text>

  <!-- Legend -->
  <rect x="100" y="1340" width="700" height="60" rx="8" fill="#0f172a" stroke="#334155" stroke-width="1"/>
  <rect x="120" y="1360" width="12" height="12" rx="2" fill="#6366f1"/>
  <text x="140" y="1371" fill="#94a3b8" font-size="10">Core pipeline</text>
  <rect x="260" y="1360" width="12" height="12" rx="2" fill="#f59e0b"/>
  <text x="280" y="1371" fill="#94a3b8" font-size="10">Content resolution (fetches external data)</text>
  <rect x="510" y="1360" width="12" height="12" rx="2" fill="#7c3aed"/>
  <text x="530" y="1371" fill="#94a3b8" font-size="10">Conversion + user hooks</text>
  <rect x="700" y="1360" width="12" height="12" rx="2" fill="#22c55e"/>
  <text x="720" y="1371" fill="#94a3b8" font-size="10">Output</text>
</svg>
