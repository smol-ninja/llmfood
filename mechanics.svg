<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 1020" font-family="system-ui, -apple-system, sans-serif">
  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="#6366f1"/>
    </marker>
    <marker id="arrow-gray" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="#94a3b8"/>
    </marker>
    <linearGradient id="bg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e1b4b"/>
    </linearGradient>
  </defs>

  <rect width="900" height="1020" rx="16" fill="url(#bg)"/>

  <!-- Title -->
  <text x="450" y="48" text-anchor="middle" fill="#e2e8f0" font-size="24" font-weight="700">llmfood</text>
  <text x="450" y="72" text-anchor="middle" fill="#94a3b8" font-size="13">Docusaurus HTML → LLM-friendly Markdown</text>

  <!-- Step 1: Entry Point -->
  <rect x="250" y="100" width="400" height="56" rx="10" fill="#312e81" stroke="#6366f1" stroke-width="1.5"/>
  <text x="450" y="124" text-anchor="middle" fill="#c7d2fe" font-size="13" font-weight="600">Entry Point</text>
  <text x="450" y="142" text-anchor="middle" fill="#a5b4fc" font-size="12" font-family="monospace">generateLlmsMarkdown(config)</text>

  <!-- Arrow 1→2 -->
  <line x1="450" y1="156" x2="450" y2="186" stroke="#6366f1" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Step 2: Discover -->
  <rect x="250" y="190" width="400" height="70" rx="10" fill="#1e293b" stroke="#334155" stroke-width="1"/>
  <text x="270" y="213" fill="#e2e8f0" font-size="13" font-weight="600">1. Discover Pages</text>
  <text x="270" y="232" fill="#94a3b8" font-size="11" font-family="monospace">discoverPages(buildDir)</text>
  <text x="270" y="250" fill="#64748b" font-size="11">Recursively find all index.html in build/</text>

  <!-- Arrow 2→3 -->
  <line x1="450" y1="260" x2="450" y2="290" stroke="#6366f1" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Step 3: Filter -->
  <rect x="250" y="294" width="400" height="70" rx="10" fill="#1e293b" stroke="#334155" stroke-width="1"/>
  <text x="270" y="317" fill="#e2e8f0" font-size="13" font-weight="600">2. Filter</text>
  <text x="270" y="336" fill="#94a3b8" font-size="11" font-family="monospace">shouldIgnore(urlPath, ignorePatterns)</text>
  <text x="270" y="354" fill="#64748b" font-size="11">Skip root "/" and paths matching ignorePatterns</text>

  <!-- Arrow 3→4 -->
  <line x1="450" y1="364" x2="450" y2="394" stroke="#6366f1" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Step 4: Process (loop) -->
  <rect x="170" y="398" width="560" height="54" rx="10" fill="#312e81" stroke="#6366f1" stroke-width="1.5" stroke-dasharray="6 3"/>
  <text x="450" y="422" text-anchor="middle" fill="#c7d2fe" font-size="13" font-weight="600">3. Process Each Page</text>
  <text x="450" y="440" text-anchor="middle" fill="#a5b4fc" font-size="11" font-family="monospace">for each urlPath → processPage(buildDir, urlPath)</text>

  <!-- Arrow 4→sub-steps -->
  <line x1="450" y1="452" x2="450" y2="482" stroke="#6366f1" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Sub-step: Read HTML -->
  <rect x="100" y="486" width="230" height="56" rx="8" fill="#1e293b" stroke="#334155" stroke-width="1"/>
  <text x="215" y="509" text-anchor="middle" fill="#e2e8f0" font-size="12" font-weight="600">3a. Read HTML</text>
  <text x="215" y="528" text-anchor="middle" fill="#64748b" font-size="10">fs.readFileSync(index.html)</text>

  <!-- Sub-step: Extract Title -->
  <rect x="345" y="486" width="210" height="56" rx="8" fill="#1e293b" stroke="#334155" stroke-width="1"/>
  <text x="450" y="509" text-anchor="middle" fill="#e2e8f0" font-size="12" font-weight="600">3b. Extract Title</text>
  <text x="450" y="528" text-anchor="middle" fill="#64748b" font-size="10">Parse &lt;h1&gt; from HTML</text>

  <!-- Sub-step: Convert -->
  <rect x="570" y="486" width="230" height="56" rx="8" fill="#1e293b" stroke="#334155" stroke-width="1"/>
  <text x="685" y="509" text-anchor="middle" fill="#e2e8f0" font-size="12" font-weight="600">3c. Convert to Markdown</text>
  <text x="685" y="528" text-anchor="middle" fill="#64748b" font-size="10" font-family="monospace">htmlToMarkdown(html)</text>

  <!-- Connecting lines from loop to sub-steps -->
  <line x1="450" y1="482" x2="215" y2="486" stroke="#6366f1" stroke-width="1" opacity="0.4"/>
  <line x1="450" y1="482" x2="685" y2="486" stroke="#6366f1" stroke-width="1" opacity="0.4"/>

  <!-- Arrow to convert detail -->
  <line x1="685" y1="542" x2="685" y2="572" stroke="#6366f1" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Convert detail box (convert.ts) -->
  <rect x="490" y="576" width="390" height="170" rx="10" fill="#1a1333" stroke="#7c3aed" stroke-width="1.5"/>
  <text x="510" y="598" fill="#c4b5fd" font-size="13" font-weight="700">convert.ts — htmlToMarkdown()</text>

  <text x="510" y="620" fill="#94a3b8" font-size="11">① Extract &lt;article&gt; content</text>
  <text x="510" y="638" fill="#94a3b8" font-size="11">② Strip Docusaurus chrome (nav, footer, TOC, styles)</text>
  <text x="510" y="656" fill="#94a3b8" font-size="11">③ Turndown with 8 custom rules:</text>
  <text x="530" y="672" fill="#7c3aed" font-size="10" font-family="monospace">codeBlock · admonition · tabs · details</text>
  <text x="530" y="688" fill="#7c3aed" font-size="10" font-family="monospace">table · strikethrough · mathBlock · images</text>
  <text x="510" y="708" fill="#94a3b8" font-size="11">④ Clean up heading anchors + collapse newlines</text>

  <!-- Write .md file -->
  <rect x="100" y="576" width="370" height="56" rx="8" fill="#1e293b" stroke="#334155" stroke-width="1"/>
  <text x="285" y="599" text-anchor="middle" fill="#e2e8f0" font-size="12" font-weight="600">3d. Write Individual .md File</text>
  <text x="285" y="618" text-anchor="middle" fill="#64748b" font-size="10" font-family="monospace">fs.writeFileSync(buildDir/page.md)</text>

  <!-- Arrow from sub-steps to write -->
  <line x1="215" y1="542" x2="215" y2="576" stroke="#94a3b8" stroke-width="1" marker-end="url(#arrow-gray)"/>
  <line x1="450" y1="542" x2="350" y2="576" stroke="#94a3b8" stroke-width="1" marker-end="url(#arrow-gray)"/>

  <!-- Arrow to output section -->
  <line x1="450" y1="770" x2="450" y2="806" stroke="#6366f1" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Collect pages -->
  <rect x="250" y="770" width="400" height="40" rx="8" fill="#312e81" stroke="#6366f1" stroke-width="1"/>
  <text x="450" y="795" text-anchor="middle" fill="#c7d2fe" font-size="12" font-weight="600">Collect PageEntry[] (markdown, title, urlPath, mdPath)</text>

  <!-- Arrow -->
  <line x1="450" y1="810" x2="450" y2="836" stroke="#6366f1" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Output section -->
  <rect x="100" y="840" width="700" height="160" rx="12" fill="#0f2a1e" stroke="#22c55e" stroke-width="1.5"/>
  <text x="450" y="868" text-anchor="middle" fill="#86efac" font-size="14" font-weight="700">4. Generate Output Files</text>

  <!-- llms.txt -->
  <rect x="130" y="885" width="300" height="96" rx="8" fill="#1e293b" stroke="#334155" stroke-width="1"/>
  <text x="280" y="908" text-anchor="middle" fill="#e2e8f0" font-size="12" font-weight="600">generateLlmsTxt()</text>
  <text x="280" y="928" text-anchor="middle" fill="#64748b" font-size="10">Group pages by URL section</text>
  <text x="280" y="944" text-anchor="middle" fill="#64748b" font-size="10">Apply sectionOrder + sectionLabels</text>
  <text x="280" y="962" text-anchor="middle" fill="#22c55e" font-size="11" font-weight="600" font-family="monospace">→ build/llms.txt</text>

  <!-- Custom files -->
  <rect x="470" y="885" width="300" height="96" rx="8" fill="#1e293b" stroke="#334155" stroke-width="1"/>
  <text x="620" y="908" text-anchor="middle" fill="#e2e8f0" font-size="12" font-weight="600">generateCustomLlmsFiles()</text>
  <text x="620" y="928" text-anchor="middle" fill="#64748b" font-size="10">Filter pages by includePatterns</text>
  <text x="620" y="944" text-anchor="middle" fill="#64748b" font-size="10">Inline full markdown content</text>
  <text x="620" y="962" text-anchor="middle" fill="#22c55e" font-size="11" font-weight="600" font-family="monospace">→ build/llms-full.txt etc.</text>
</svg>
